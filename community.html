<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👥 CropCare Community</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #059669; --primary-light: #10b981;
      --card-bg: rgba(255, 255, 255, 0.88); /* Glass effect */
      --text-main: #0f172a; --text-muted: #475569;
      --border-color: rgba(255, 255, 255, 0.5); --radius: 18px;
    }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-image: 
        linear-gradient(to bottom, rgba(248, 250, 252, 0.85), rgba(226, 241, 235, 0.85)), 
        url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
      background-size: cover; background-position: center; background-attachment: fixed;
      color: var(--text-main); margin: 0; padding: 0; min-height: 100vh;
    }
    
    header { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 1.2rem; text-align: center; border-bottom: 1px solid var(--border-color); font-weight: 800; font-size: 1.5rem; color: var(--text-main); position: sticky; top:0; z-index:10; box-shadow: 0 4px 15px rgba(0,0,0,0.03);}
    
    main { padding: 3rem 1.5rem; max-width: 650px; margin: auto; }
    
    .composer { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 2rem; border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.06); margin-bottom: 2.5rem; border: 1px solid var(--border-color); }
    .composer h2 { margin-top: 0; font-size: 1.3rem; margin-bottom: 1.2rem; font-weight: 800; color: var(--primary-dark);}
    
    input, textarea { width: 100%; padding: 1.2rem; margin-bottom: 1rem; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); font-family: inherit; font-size: 1rem; font-weight: 500; background: rgba(255,255,255,0.7); box-sizing: border-box; resize: vertical; transition: 0.2s; color: var(--text-main);}
    input:focus, textarea:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 4px rgba(5,150,105,0.1);}
    input::placeholder, textarea::placeholder { color: #94a3b8;}
    
    button { width: 100%; background: var(--text-main); color: white; border: none; padding: 1.1rem; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s; }
    button:hover { background: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(5,150,105,0.25); }
    
    .feed-header { font-weight: 800; font-size: 1.3rem; margin-bottom: 1.2rem; color: var(--text-main); }
    
    .post { background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); margin-bottom: 1.2rem; padding: 1.5rem; border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 10px; transition: transform 0.2s;}
    .post:hover { transform: translateY(-2px); }
    .post-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 10px;}
    .post-disease { font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 6px; font-size: 1.05rem;}
    .post-disease::before { content: ''; display: inline-block; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; }
    .post-time { font-size: 0.85rem; color: var(--text-muted); font-weight: 700; }
    .post-content { color: #334155; line-height: 1.6; font-size: 1rem; margin-top: 5px; font-weight: 500;}
    
    .back-link { display: inline-block; margin-top: 2rem; color: white; background: var(--text-main); padding: 1rem 2rem; border-radius: 999px; text-decoration: none; font-weight: 800; font-size: 1rem; text-align: center; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.1);}
    .back-link:hover { background: var(--primary); transform: translateY(-2px); }
  </style>
</head>
<body>
  <header>👥 Global Grower Feed</header>
  <main>
    <div class="composer">
      <h2>✍️ Log Treatment Success</h2>
      <form method="POST">
        <input type="text" name="disease" placeholder="Disease Name (e.g., Apple Scab)" required>
        <textarea name="notes" rows="3" placeholder="I utilized an organic copper fungicide spray and noticed..." required></textarea>
        <button type="submit">Publish Findings</button>
      </form>
    </div>

    <div class="feed-header">Latest Field Logs</div>
    
    {% for d, notes, created_at in posts %}
    <div class="post">
      <div class="post-header">
        <div class="post-disease">{{ d }}</div>
        <div class="post-time">{{ created_at }}</div>
      </div>
      <div class="post-content">
        {{ notes }}
      </div>
    </div>
    {% endfor %}

    <div style="text-align: center;">
      <a href="/" class="back-link">&larr; Back to Diagnostics</a>
    </div>
  </main>
</body>
</html>
